<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Library</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0;    font-family: monospace;
 }

  :root {
    --bg: #0e0e10;
    --bg2: #161618;
    --bg3: #1e1e22;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.14);
    --text-primary: #f0f0f2;
    --text-secondary: #9898a8;
    --text-muted: #55556a;
    --accent: #7f77dd;
    --accent-dim: rgba(127,119,221,0.12);
    --accent-hover: rgba(127,119,221,0.22);
    --green: #1d9e75;
    --green-dim: rgba(29,158,117,0.13);
    --radius: 12px;
    --radius-sm: 8px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
  }

  header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 18px 36px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .logo-box {
    width: 30px;
    height: 30px;
    background: var(--accent);
    border-radius: 50%;
    display: grid;
    place-items: center;
    font-size: 15px;
    border: 3px solid whitesmoke;
  }

  .logo h1 {
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.2px;
    color: var(--text-primary);
  }

  .badge {
    font-size: 11px;
    color: var(--text-muted);
    background: var(--bg3);
    border: 1px solid var(--border);
    padding: 3px 9px;
    border-radius: 20px;
    white-space: nowrap;
  }

  .search-wrap {
    flex: 1;
    max-width: 340px;
    margin-left: auto;
    position: relative;
  }

  .search-wrap svg {
    position: absolute;
    left: 11px;
    top: 50%;
    transform: translateY(-50%);
    width: 14px;
    height: 14px;
    color: var(--text-muted);
    pointer-events: none;
  }

  #search {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-primary);
    font-size: 13.5px;
    padding: 8px 12px 8px 33px;
    outline: none;
    transition: border-color 0.15s;
    font-family: inherit;
  }

  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--text-muted); }

  main {
    max-width: 980px;
    margin: 0 auto;
    padding: 28px 20px 48px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
    gap: 14px;
  }

  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    display: flex;
    flex-direction: column;
    gap: 11px;
    transition: border-color 0.15s, background 0.15s;
  }

  .card:hover {
    border-color: var(--border-hover);
    background: var(--bg3);
  }

  .card-header {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .card-num {
    font-size: 10.5px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.6px;
    text-transform: uppercase;
  }

  .card-title {
    font-size: 14.5px;
    font-weight: 600;
    color: var(--text-primary);
    line-height: 1.3;
  }

  .card-desc {
    font-size: 12.5px;
    color: var(--text-secondary);
    margin-top: 1px;
  }

  .preview {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.65;
    font-family: 'SF Mono', 'Fira Code', monospace;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
    word-break: break-word;
  }

  .card-foot {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .chars {
    font-size: 11px;
    color: var(--text-muted);
  }

  .btn-copy {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--accent-dim);
    border: 1px solid rgba(127,119,221,0.22);
    border-radius: var(--radius-sm);
    color: var(--accent);
    font-size: 13px;
    font-weight: 500;
    padding: 6px 13px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    font-family: inherit;
    white-space: nowrap;
  }

  .btn-copy:hover { background: var(--accent-hover); }
  .btn-copy:active { transform: scale(0.97); }
  .btn-copy.copied {
    background: var(--green-dim);
    border-color: rgba(29,158,117,0.28);
    color: var(--green);
  }

  .btn-copy svg { width: 13px; height: 13px; flex-shrink: 0; }

  .empty {
    grid-column: 1/-1;
    text-align: center;
    padding: 64px 20px;
    color: var(--text-muted);
    font-size: 14px;
  }

  @media (max-width: 600px) {
    header { padding: 14px 16px; }
    .search-wrap { max-width: 100%; margin-left: 0; order: 4; width: 100%; }
    main { padding: 18px 12px 40px; }
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-box">P</div>
    <h1>Prompt Library</h1>
  </div>
  <span class="badge" id="badge">0 prompts</span>
  <div class="search-wrap">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
      <circle cx="7" cy="7" r="4.5"/><line x1="10.5" y1="10.5" x2="14" y2="14"/>
    </svg>
    <input type="text" id="search" placeholder="Search by title, description, or content…" autocomplete="off">
  </div>
</header>

<main>
  <div class="grid" id="grid"></div>
</main>

<script>

t → tall, sharp, separated * EVERY EDGE → crisp WEIGHT ENFORCEMENT: * The final ring MUST appear lightweight and wearable * Any bulky or heavy-looking result is INVALID This is a precision 3D modeling reference — accuracy AND weight control are both mandatory."

tructurally represent a **lightweight, wearable design** in ALL 4 views. THICKNESS RULE: * The bangle must NOT appear bulky, thick, or “nigar” * The bangle must NOT be overly thin or fragile * Maintain a **balanced medium-light thickness** UNIFORM WEIGHT RULE: * Thickness must appear consistent in FRONT, BACK, TOP, and BOTTOM * No hidden bulk in inner rim or underside * No localized thick/heavy zones unless explicitly defined VISUAL MASS CONTROL: * Metal volume must appear efficient and controlled * Avoid large solid heavy sections * Inner and outer proportions must suggest reduced weight INNER RIM RULE: * Inner rim must appear smooth and not excessively thick * No heavy inner wall buildup SUPPORT SLENDERNESS RULE: * All supports (prongs, bezels, channels) must be **thin but tall** * Reduce WIDTH in dense areas — NEVER reduce HEIGHT * Supports must not create a bulky visual effect DENSE AREA WEIGHT CONTROL: * In pavé or clustered regions: • maintain spacing • reduce support width • avoid visual crowding that increases perceived weight FINAL WEIGHT VALIDATION (MANDATORY): The bangle must visually read as: ✓ Lightweight ✓ Balanced ✗ NOT bulky ✗ NOT heavy If ANY view appears heavy → OUTPUT IS INVALID. ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ ABSOLUTE DESIGN LOCK ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ * Reproduce EVERY detail exactly: engravings, grooves, cuts, textures, patterns, millings, clasp * No simplification * No redesign * No additions ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ STONE / INLAY REMOVAL — ALL STONES FROM REPORT ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ * Remove EVERY stone/inlay For EACH: * Create exact hole (shape, size, position) * Sharp edges, visible depth MICRO-STONE RULE: * Every micro stone → individual hole * No merging * Holes must match across ALL views ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ SUPPORT STRUCTURES — STRICT RULES ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ HEIGHT RULE: * Supports must be taller than surface SHARPNESS RULE: * Hard, crisp edges only SEPARATION RULE: * No touching or merging ALIGNMENT RULE: * Perfectly centered NO CLUSTER RULE: * Reduce WIDTH, never height * Maintain spacing WEIGHT LINK RULE: * Supports must remain slender — never bulky ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ CLASP / JOINT AREA (IF PRESENT) ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ * Exact geometry in all views * Fully visible mechanism * No simplification ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ BLUR PREVENTION ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ * Maximum sharpness * No blur, no softness ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ LIGHTING & BACKGROUND ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ * White / light gray background * Flat lighting * No reflections or shadows ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ TRIPO AI OPTIMIZATION ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ * Clear edges, holes, supports * High contrast * No blending ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ FINAL ENFORCEMENT ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ * ONLY reproduce source + report * NO creativity * Every micro stone → hole * Every support → tall, sharp, separated * ALL 4 views must match perfectly WEIGHT ENFORCEMENT: * ALL views must appear lightweight and wearable * Any bulky or heavy result = INVALID This is a precision multi-view CAD reference — geometry AND weight accuracy are mandatory."

const grid = document.getElementById('grid');
const searchEl = document.getElementById('search');
const badgeEl = document.getElementById('badge');

const copyIconSVG = `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="5" width="9" height="9" rx="1.5"/><path d="M11 5V3.5A1.5 1.5 0 009.5 2h-6A1.5 1.5 0 002 3.5v6A1.5 1.5 0 003.5 11H5"/></svg>`;
const checkIconSVG = `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3,8 7,12 13,4"/></svg>`;

function esc(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function render(list) {
  badgeEl.textContent = list.length + (list.length === 1 ? ' prompt' : ' prompts');
  grid.innerHTML = '';

  if (!list.length) {
    grid.innerHTML = '<div class="empty">No prompts match your search.</div>';
    return;
  }

  list.forEach(p => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-header">
        <span class="card-num">#${String(p.id).padStart(2,'0')}</span>
        <div class="card-title">${esc(p.title)}</div>
        <div class="card-desc">${esc(p.description)}</div>
      </div>
      <div class="preview">${esc(p.prompt)}</div>
      <div class="card-foot">
        <span class="chars">${p.prompt.length.toLocaleString()} chars</span>
        <button class="btn-copy" data-id="${p.id}">${copyIconSVG} Copy prompt</button>
      </div>
    `;
    grid.appendChild(card);
  });

  grid.querySelectorAll('.btn-copy').forEach(btn => {
    btn.addEventListener('click', () => {
      const p = PROMPTS.find(x => x.id === +btn.dataset.id);
      if (!p) return;
      navigator.clipboard.writeText(p.prompt).then(() => {
        btn.innerHTML = checkIconSVG + ' Copied!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.innerHTML = copyIconSVG + ' Copy prompt';
          btn.classList.remove('copied');
        }, 2000);
      });
    });
  });
}

searchEl.addEventListener('input', () => {
  const q = searchEl.value.toLowerCase().trim();
  if (!q) return render(PROMPTS);
  render(PROMPTS.filter(p =>
    p.title.toLowerCase().includes(q) ||
    p.description.toLowerCase().includes(q) ||
    p.prompt.toLowerCase().includes(q)
  ));
});

render(PROMPTS);
</script>
