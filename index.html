<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PromptVault - Brutalist</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>



<section class="hero brutalist-hero">
  <h1 class="glitch">BRUTALIST PROMPT VAULT</h1>
  <p class="hero-subtitle">Copy-ready AI prompts</p>
  <span id="promptCount" class="prompt-count"></span> PROMPTS
</section>

<main class="container brutalist-container">
  <div id="promptsGrid" class="prompts-grid brutalist-grid"></div>

  <div id="emptyState" class="empty-state brutalist-empty" style="display:none">
    <h3>NO RESULTS</h3>
    <p>Try another search</p>
  </div>
</main>

<div id="toastContainer" class="toast-container brutalist-toast-container"></div>

<script src="script.js"></script>
</body>
</html>
