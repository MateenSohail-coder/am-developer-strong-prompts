<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Library</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0;    font-family: monospace;
 }

  :root {
    --bg: #0e0e10;
    --bg2: #161618;
    --bg3: #1e1e22;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.14);
    --text-primary: #f0f0f2;
    --text-secondary: #9898a8;
    --text-muted: #55556a;
    --accent: #7f77dd;
    --accent-dim: rgba(127,119,221,0.12);
    --accent-hover: rgba(127,119,221,0.22);
    --green: #1d9e75;
    --green-dim: rgba(29,158,117,0.13);
    --radius: 12px;
    --radius-sm: 8px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
  }

  header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 18px 36px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .logo-box {
    width: 30px;
    height: 30px;
    background: var(--accent);
    border-radius: 50%;
    display: grid;
    place-items: center;
    font-size: 15px;
    border: 3px solid whitesmoke;
  }

  .logo h1 {
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.2px;
    color: var(--text-primary);
  }

  .badge {
    font-size: 11px;
    color: var(--text-muted);
    background: var(--bg3);
    border: 1px solid var(--border);
    padding: 3px 9px;
    border-radius: 20px;
    white-space: nowrap;
  }

  .search-wrap {
    flex: 1;
    max-width: 340px;
    margin-left: auto;
    position: relative;
  }

  .search-wrap svg {
    position: absolute;
    left: 11px;
    top: 50%;
    transform: translateY(-50%);
    width: 14px;
    height: 14px;
    color: var(--text-muted);
    pointer-events: none;
  }

  #search {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-primary);
    font-size: 13.5px;
    padding: 8px 12px 8px 33px;
    outline: none;
    transition: border-color 0.15s;
    font-family: inherit;
  }

  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--text-muted); }

  main {
    max-width: 980px;
    margin: 0 auto;
    padding: 28px 20px 48px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
    gap: 14px;
  }

  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    display: flex;
    flex-direction: column;
    gap: 11px;
    transition: border-color 0.15s, background 0.15s;
  }

  .card:hover {
    border-color: var(--border-hover);
    background: var(--bg3);
  }

  .card-header {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .card-num {
    font-size: 10.5px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.6px;
    text-transform: uppercase;
  }

  .card-title {
    font-size: 14.5px;
    font-weight: 600;
    color: var(--text-primary);
    line-height: 1.3;
  }

  .card-desc {
    font-size: 12.5px;
    color: var(--text-secondary);
    margin-top: 1px;
  }

  .preview {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.65;
    font-family: 'SF Mono', 'Fira Code', monospace;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
    word-break: break-word;
  }

  .card-foot {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .chars {
    font-size: 11px;
    color: var(--text-muted);
  }

  .btn-copy {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--accent-dim);
    border: 1px solid rgba(127,119,221,0.22);
    border-radius: var(--radius-sm);
    color: var(--accent);
    font-size: 13px;
    font-weight: 500;
    padding: 6px 13px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    font-family: inherit;
    white-space: nowrap;
  }

  .btn-copy:hover { background: var(--accent-hover); }
  .btn-copy:active { transform: scale(0.97); }
  .btn-copy.copied {
    background: var(--green-dim);
    border-color: rgba(29,158,117,0.28);
    color: var(--green);
  }

  .btn-copy svg { width: 13px; height: 13px; flex-shrink: 0; }

  .empty {
    grid-column: 1/-1;
    text-align: center;
    padding: 64px 20px;
    color: var(--text-muted);
    font-size: 14px;
  }

  @media (max-width: 600px) {
    header { padding: 14px 16px; }
    .search-wrap { max-width: 100%; margin-left: 0; order: 4; width: 100%; }
    main { padding: 18px 12px 40px; }
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-box">P</div>
    <h1>Prompt Library</h1>
  </div>
  <span class="badge" id="badge">0 prompts</span>
  <div class="search-wrap">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
      <circle cx="7" cy="7" r="4.5"/><line x1="10.5" y1="10.5" x2="14" y2="14"/>
    </svg>
    <input type="text" id="search" placeholder="Search by title, description, or content…" autocomplete="off">
  </div>
</header>

<main>
  <div class="grid" id="grid"></div>
</main>

<script>

  {

 / pavé / invisible - Number of visible prongs (if any) - Is any shadow falling on this stone obscuring detail? Do NOT skip any stone. Even micro ones must be listed. ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ 3. CIRCULAR OR CURVED ELEMENTS ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ List any circular/rounded/curved design elements that are NOT stones: (e.g. halo rings, circular engravings, curved prong bases, gallery details, decorative circles) For each: describe shape, position, approximate size. ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ 4. DENSE CLUSTER AREAS ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ Identify any areas where multiple small stones or design elements are closely packed together. - Exact location - Approximate element count in cluster - Do these clusters contribute to a heavy/bulky look? ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ 5. SUPPORT STRUCTURE VISIBLE ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ Describe all visible prongs, claws, bezels, channels: - Height: low / medium / raised - Shape: rounded / pointed / flat-edged - Count per stone - Do they look thin & slender or thick & bulky? - Do supports add to visual weight of the ring? ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ 6. FINAL WEIGHT VERDICT ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ Based ONLY on what is visible: - Overall weight impression: lightweight / medium / heavy-nigar - Is band thickness the main source of visual weight? - Are supports adding bulk? - Reconstruction instruction: What must be thinned or reduced to achieve a light, wearable appearance while keeping the design 100% faithful? Output as numbered sections exactly as above. Be precise. Do not generalize. Do not assume."
 
  },
  {
    id: 2,
    title: "1 View Ring Image Reconstruction - Step 2",
    description: "prompt to create a perfect ring image for AI 3D modeling",
    prompt:"STRICT RECONSTRUCTION ONLY. ZERO CREATIVE DECISIONS PERMITTED. You are a technical CAD reference generator — not an artist. Do NOT invent, predict, stylize, or deviate from the source image or analysis report below. Every output element must be traceable to the image or the report. If something is unclear, reproduce only its visible boundary — never guess its interior. ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ REFERENCE DATA (treat as ground truth): ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ [PASTE ANALYSIS REPORT HERE] ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ TASK ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ Generate a single high-resolution ring reference image optimized for Tripo AI 3D model generation. Use ONLY the source image + analysis report as references. ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ WEIGHT & THINNESS — HIGHEST PRIORITY RULE ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ The ring MUST appear THIN, LIGHT, and WEARABLE. This is the #1 rule. Everything else serves this goal. BAND THICKNESS LAW: - The band must look THIN — not ultra-fragile, but clearly slender and lightweight - If the source ring looks bulky/nigar: REDUCE band thickness to medium-light in this reference - If source is already thin: reproduce exactly - Under NO circumstances should the band look heavy, thick, or solid-blocked METAL VOLUME LAW: - Minimize visible metal mass everywhere - No solid heavy blocks of metal - Every structural element must look efficient — just enough metal, no excess SUPPORT SLENDERNESS LAW: - All prongs/bezels must be THIN but TALL - Reduce width — NEVER reduce height - Slender supports = lightweight appearance DESIGNER EDITING HEADROOM (CRITICAL): - The model must be generated THINNER than final desired weight - This gives the CAD designer room to add thickness where needed for structural integrity - Never pre-build excess thickness — always under-build it SHADOW REMOVAL LAW: - Remove ALL shadows from the ring surface - Remove ALL shadows from background - Flat even lighting only — no dramatic shadows - If source image has shadows obscuring design: reconstruct only what is clearly visible, leave obscured areas as clean metal surface ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ GEOMETRY — NON-NEGOTIABLE ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ - Band must be a MATHEMATICALLY PERFECT CIRCLE - Inner hole and outer edge: perfectly concentric - Band thickness: identical at every point - NO oval, skewing, warping, or distortion - View: clean 3/4 angle — design face + band curvature both visible - No perspective distortion - All circular decorative elements: perfectly circular ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ ABSOLUTE DESIGN LOCK ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ - Reproduce EVERY surface detail exactly - No simplification, no additions, no redesign - Only what exists in source + report ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ STONE REMOVAL ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ Remove ALL stones (including micro). For EACH stone: - Create exact hole (shape, size, position) - Sharp edges, visible depth MICRO RULE: Every micro stone → individual hole. No merging permitted. ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ SUPPORT STRUCTURES ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ - All supports: clearly taller than surface - Hard edges only — no soft or blobby geometry - No touching, no merging between supports - Perfectly centered on each hole - THIN but TALL in dense areas - Supports must NOT add visual bulk ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ BLUR & SHADOW PREVENTION ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ - Maximum sharpness throughout - No blur of any kind - No shadows on ring surface - No shadows on background - No reflections, no sparkle, no lens flare ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ LIGHTING & BACKGROUND ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ - Pure white or very light gray background - Flat, even, shadowless studio lighting - No reflections ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ TRIPO AI OPTIMIZATION ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ - Clear readable geometry throughout - High contrast: surface vs holes - High contrast: surface vs supports - Every structural boundary must be readable ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ FINAL VALIDATION CHECKLIST ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ Before output, confirm: ✓ Band appears THIN and lightweight ✓ No shadows anywhere ✓ All stones replaced with clean holes ✓ Supports are tall, thin, separated ✓ All edges are crisp and hard ✓ No creativity — 100% source-faithful ✓ Designer has room to add thickness later If band looks heavy/nigar → OUTPUT IS INVALID. If shadows are visible → OUTPUT IS INVALID."

tructurally represent a **lightweight, wearable design** in ALL 4 views. THICKNESS RULE: * The bangle must NOT appear bulky, thick, or “nigar” * The bangle must NOT be overly thin or fragile * Maintain a **balanced medium-light thickness** UNIFORM WEIGHT RULE: * Thickness must appear consistent in FRONT, BACK, TOP, and BOTTOM * No hidden bulk in inner rim or underside * No localized thick/heavy zones unless explicitly defined VISUAL MASS CONTROL: * Metal volume must appear efficient and controlled * Avoid large solid heavy sections * Inner and outer proportions must suggest reduced weight INNER RIM RULE: * Inner rim must appear smooth and not excessively thick * No heavy inner wall buildup SUPPORT SLENDERNESS RULE: * All supports (prongs, bezels, channels) must be **thin but tall** * Reduce WIDTH in dense areas — NEVER reduce HEIGHT * Supports must not create a bulky visual effect DENSE AREA WEIGHT CONTROL: * In pavé or clustered regions: • maintain spacing • reduce support width • avoid visual crowding that increases perceived weight FINAL WEIGHT VALIDATION (MANDATORY): The bangle must visually read as: ✓ Lightweight ✓ Balanced ✗ NOT bulky ✗ NOT heavy If ANY view appears heavy → OUTPUT IS INVALID. ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ ABSOLUTE DESIGN LOCK ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ * Reproduce EVERY detail exactly: engravings, grooves, cuts, textures, patterns, millings, clasp * No simplification * No redesign * No additions ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ STONE / INLAY REMOVAL — ALL STONES FROM REPORT ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ * Remove EVERY stone/inlay For EACH: * Create exact hole (shape, size, position) * Sharp edges, visible depth MICRO-STONE RULE: * Every micro stone → individual hole * No merging * Holes must match across ALL views ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ SUPPORT STRUCTURES — STRICT RULES ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ HEIGHT RULE: * Supports must be taller than surface SHARPNESS RULE: * Hard, crisp edges only SEPA const grid = document.getElementById('grid');
const searchEl = document.getElementById('search');
const badgeEl = document.getElementById('badge');

const copyIconSVG = `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="5" width="9" height="9" rx="1.5"/><path d="M11 5V3.5A1.5 1.5 0 009.5 2h-6A1.5 1.5 0 002 3.5v6A1.5 1.5 0 003.5 11H5"/></svg>`;
const checkIconSVG = `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3,8 7,12 13,4"/></svg>`;

function esc(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function render(list) {
  badgeEl.textContent = list.length + (list.length === 1 ? ' prompt' : ' prompts');
  grid.innerHTML = '';

  if (!list.length) {
    grid.innerHTML = '<div class="empty">No prompts match your search.</div>';
    return;
  }

  list.forEach(p => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-header">
        <span class="card-num">#${String(p.id).padStart(2,'0')}</span>
        <div class="card-title">${esc(p.title)}</div>
        <div class="card-desc">${esc(p.description)}</div>
      </div>
      <div class="preview">${esc(p.prompt)}</div>
      <div class="card-foot">
        <span class="chars">${p.prompt.length.toLocaleString()} chars</span>
        <button class="btn-copy" data-id="${p.id}">${copyIconSVG} Copy prompt</button>
      </div>
    `;
    grid.appendChild(card);
  });

  grid.querySelectorAll('.btn-copy').forEach(btn => {
    btn.addEventListener('click', () => {
      const p = PROMPTS.find(x => x.id === +btn.dataset.id);
      if (!p) return;
      navigator.clipboard.writeText(p.prompt).then(() => {
        btn.innerHTML = checkIconSVG + ' Copied!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.innerHTML = copyIconSVG + ' Copy prompt';
          btn.classList.remove('copied');
        }, 2000);
      });
    });
  });
}

searchEl.addEventListener('input', () => {
  const q = searchEl.value.toLowerCase().trim();
  if (!q) return render(PROMPTS);
  render(PROMPTS.filter(p =>
    p.title.toLowerCase().includes(q) ||
    p.description.toLowerCase().includes(q) ||
    p.prompt.toLowerCase().includes(q)
  ));
});

render(PROMPTS);
</script>
